name: Bug report
description: Something in the MCP server isn't working right
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Before you continue:

        - **Security issue?** Please use the process in [SECURITY.md](../SECURITY.md)
          instead, not a public issue.
        - **Upstream ZapFetch API issue** (the API itself returns wrong
          data, 5xx, slow)? That's a separate repo — contact ZapFetch
          support. This repo is just the MCP wrapper.

  - type: dropdown
    id: transport
    attributes:
      label: Transport mode
      description: Which transport does the bug reproduce on?
      options:
        - STDIO (Claude Desktop / Cursor / Windsurf)
        - HTTP (self-hosted)
        - Both
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npm ls @zapfetchdev/mcp-server` or the Docker tag
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`
      placeholder: "v22.11.0"

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Ideally a minimal MCP tool call or curl command that triggers
        the bug, plus any relevant client config.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste stderr output from the server. **Redact any API keys
        or bearer tokens** before posting — stderr should not contain
        them, but double-check.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I've searched existing issues for duplicates
          required: true
        - label: I've confirmed this is the MCP wrapper, not the upstream ZapFetch API
          required: true
        - label: I've redacted API keys and bearer tokens from the logs above
          required: true
