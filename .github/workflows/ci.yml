name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Assert STDIO has no http-only deps
        # Protects STDIO users (npx / Claude Desktop / Cursor / Windsurf)
        # from paying express's 40+ transitive deps on cold start.
        # `prepublishOnly` already gates this for publishes; running here
        # surfaces regressions at PR time instead of at tag time.
        run: npm run assert:stdio-deps

      - name: Test
        run: npm test
